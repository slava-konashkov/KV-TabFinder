name: KV-TabFinder
options:
  bundleIdPrefix: com.konashkov
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  developmentLanguage: en

configs:
  Debug: debug
  Release: release
  # "Local" is a release-optimised build intended for local
  # installation into /Applications. No sandbox (free Apple ID can't
  # issue a provisioning profile for scripting-targets), hardened
  # runtime on, optimiser on, no debugger entitlement.
  Local: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_STRICT_CONCURRENCY: minimal
    GENERATE_INFOPLIST_FILE: NO
  configs:
    Debug:
      ENABLE_HARDENED_RUNTIME: NO
    Release:
      ENABLE_HARDENED_RUNTIME: YES
    Local:
      ENABLE_HARDENED_RUNTIME: YES
      SWIFT_OPTIMIZATION_LEVEL: -O
      SWIFT_COMPILATION_MODE: wholemodule

targets:
  KV-TabFinder:
    type: application
    platform: macOS
    sources:
      - path: KV-TabFinder
        excludes:
          - "Info.plist"
          - "KV-TabFinder.entitlements"
          - "KV-TabFinder-Debug.entitlements"
    resources:
      - KV-TabFinder/Assets.xcassets
    dependencies:
      - sdk: libsqlite3.tbd
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.konashkov.KV-TabFinder
        PRODUCT_NAME: "KV-TabFinder"
        PRODUCT_MODULE_NAME: KVTabFinder
        INFOPLIST_FILE: KV-TabFinder/Info.plist
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: YES
      configs:
        Debug:
          CODE_SIGN_ENTITLEMENTS: KV-TabFinder/KV-TabFinder-Debug.entitlements
        Release:
          CODE_SIGN_ENTITLEMENTS: KV-TabFinder/KV-TabFinder.entitlements
        Local:
          CODE_SIGN_ENTITLEMENTS: KV-TabFinder/KV-TabFinder-Debug.entitlements
    info:
      path: KV-TabFinder/Info.plist
      properties:
        LSUIElement: YES
        NSAppleEventsUsageDescription: "KV-TabFinder reads titles of your open browser tabs so you can search and jump to them."
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"

  KV-TabFinderTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - KV-TabFinderTests
    dependencies:
      - target: KV-TabFinder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.konashkov.KV-TabFinderTests
        PRODUCT_MODULE_NAME: KVTabFinderTests
        GENERATE_INFOPLIST_FILE: YES
